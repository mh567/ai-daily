<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily — 每日 AI 资讯</title>
  <meta name="description" content="AI Daily 是一份专业的 AI 资讯日报，聚焦大模型与产业变革。">
  <meta property="og:title" content="AI Daily — 每日 AI 资讯">
  <meta property="og:description" content="AI Daily 是一份专业的 AI 资讯日报，聚焦大模型与产业变革。">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400&display=swap">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAFAF8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="assets/icon-120.png">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('ai-daily-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <a href="#main-content" class="skip-link">跳转到主要内容</a>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        AI Daily <span class="nav__logo-dot"></span>
      </a>
      <div class="nav__links">
        <a href="index.html" class="nav__link nav__link--active">文章</a>
        <a href="about.html" class="nav__link">关于</a>
        <button class="theme-toggle" aria-label="切换主题"></button>
      </div>
      <button class="nav__mobile-toggle" aria-label="菜单"><span></span></button>
    </div>
  </nav>


  <!-- Main Content -->
  <main id="main-content">
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <div class="hero__eyebrow">AI Daily</div>
        <h1 class="hero__title">追踪人工智能的每一个重要时刻</h1>
        <div class="hero__date">每日黄昏，如约而至</div>
      </div>
    </section>

    <hr class="divider container">

    <!-- Article List -->
    <section class="articles container">
      <div class="articles-list" aria-busy="true">
        <!-- Loading skeleton -->
        <div class="skeleton-card">
          <div class="skeleton-card__left">
            <div class="skeleton-line skeleton-line--sm"></div>
            <div class="skeleton-line skeleton-line--lg"></div>
            <div class="skeleton-line skeleton-line--md"></div>
            <div class="skeleton-line skeleton-line--sm skeleton-line--cta"></div>
          </div>
          <div class="skeleton-card__num"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-card__left">
            <div class="skeleton-line skeleton-line--sm"></div>
            <div class="skeleton-line skeleton-line--lg"></div>
            <div class="skeleton-line skeleton-line--md"></div>
            <div class="skeleton-line skeleton-line--sm skeleton-line--cta"></div>
          </div>
          <div class="skeleton-card__num"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__copy">&copy; 2026 AI Daily. All rights reserved.</div>
      <div class="footer__links">
        <a href="about.html" class="footer__link">关于我们</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
</body>
</html>
